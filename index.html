<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>choose clicker theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, 'Exo 2', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .picker {
            max-width: 880px;
            width: 100%;
            background: white;
            padding: 1.8rem 1.5rem 2rem 1.5rem;
            transition: all 0.2s;
        }

        .title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3a7a34, #d97a2c, #e6b13e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2.5rem;
            margin: 1.5rem 0 2rem;
        }

        /* circular buttons — no edge container, pure circle shape */
        .theme-btn {
            border: none;
            border-radius: 50%;
            background: #f8f6f0;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.15s ease;
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.02);
        }

        /* press effect */
        .theme-btn:active {
            transform: scale(0.94);
            transition: 0.04s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        /* huge emoji inside circle */
        .btn-emoji {
            font-size: 5rem;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            transition: transform 0.1s ease;
            line-height: 1;
            pointer-events: none;
        }

        .theme-btn:hover .btn-emoji {
            transform: scale(1.03);
        }

        /* individual light background colors based on emoji — no dark grey shadows */
        .btn-peach { background: #ffede1; box-shadow: 0 8px 18px -6px rgba(255, 160, 90, 0.2), 0 0 0 1px rgba(255, 190, 130, 0.3); }
        .btn-apple { background: #e6f5dc; box-shadow: 0 8px 18px -6px rgba(120, 170, 70, 0.2), 0 0 0 1px rgba(150, 200, 100, 0.3); }
        .btn-carrot { background: #fff0e0; box-shadow: 0 8px 18px -6px rgba(240, 150, 60, 0.2), 0 0 0 1px rgba(245, 170, 90, 0.3); }
        .btn-corn { background: #fffae6; box-shadow: 0 8px 18px -6px rgba(230, 190, 70, 0.2), 0 0 0 1px rgba(235, 200, 90, 0.3); }
        .btn-lemon { background: #fffce8; box-shadow: 0 8px 18px -6px rgba(220, 200, 40, 0.2), 0 0 0 1px rgba(230, 210, 70, 0.3); }
        .btn-tomato { background: #ffeae5; box-shadow: 0 8px 18px -6px rgba(220, 100, 70, 0.2), 0 0 0 1px rgba(235, 120, 85, 0.3); }

        /* hover: slightly richer background matching emoji */
        .btn-peach:hover { background: #ffe2d0; }
        .btn-apple:hover { background: #dcf2cc; }
        .btn-carrot:hover { background: #ffe5d0; }
        .btn-corn:hover { background: #fff5d8; }
        .btn-lemon:hover { background: #fff9d8; }
        .btn-tomato:hover { background: #ffe0d5; }

        .howto {
            background: #fafaf8;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            border: 1px solid #efede5;
        }

        .howto-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #4a6e3a;
        }

        .howto-left span {
            font-size: 1.8rem;
        }

        .howto-steps {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5c4a2e;
        }

        .step {
            background: #fff7ec;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 680px) {
            .theme-grid { gap: 1rem; }
            .btn-emoji { font-size: 3.8rem; }
            .picker { padding: 1rem; }
            .howto { flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 520px) {
            .btn-emoji { font-size: 2.8rem; }
        }

        .theme-btn:focus-visible {
            outline: 3px solid #f5bc70;
            outline-offset: 3px;
            transform: scale(0.98);
        }

        /* no container edge whatsoever */
        body {
            background: #ffffff;
        }
    </style>
</head>
<body>
<div class="picker">
    <div class="title">
        <h1>choose clicker theme</h1>
    </div>

    <!-- 3x2 grid: six round buttons, each with exact link -->
    <div class="theme-grid">
        <!-- peach -->
        <button class="theme-btn btn-peach" data-url="https://clicker-game.neineig2012.workers.dev/peach">
            <span class="btn-emoji">🍑</span>
        </button>
        <!-- apple -->
        <button class="theme-btn btn-apple" data-url="https://clicker-game.neineig2012.workers.dev/apple">
            <span class="btn-emoji">🍏</span>
        </button>
        <!-- carrot -->
        <button class="theme-btn btn-carrot" data-url="https://clicker-game.neineig2012.workers.dev/carrot">
            <span class="btn-emoji">🥕</span>
        </button>
        <!-- corn -->
        <button class="theme-btn btn-corn" data-url="https://clicker-game.neineig2012.workers.dev/corn">
            <span class="btn-emoji">🌽</span>
        </button>
        <!-- lemon -->
        <button class="theme-btn btn-lemon" data-url="https://clicker-game.neineig2012.workers.dev/lemon">
            <span class="btn-emoji">🍋</span>
        </button>
        <!-- tomato -->
        <button class="theme-btn btn-tomato" data-url="https://clicker-game.neineig2012.workers.dev/tomato">
            <span class="btn-emoji">🍅</span>
        </button>
    </div>

    <!-- minimalist how-to block (kept clean) -->
    <div class="howto">
        <div class="howto-left">
            <span>🎮</span> quick guide
        </div>
        <div class="howto-steps">
            <div class="step">🍎 tap circle → launch clicker</div>
            <div class="step">🖱️ click giant crop → earn</div>
            <div class="step">⬆️ buy upgrades & research</div>
            <div class="step">✨ prestige → permanent boost</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // get all theme buttons
        const btns = document.querySelectorAll('.theme-btn');
        
        btns.forEach(btn => {
            const targetUrl = btn.getAttribute('data-url');
            if (targetUrl) {
                // click navigation with exact link
                const handleNavigation = (e) => {
                    e.preventDefault();
                    window.location.href = targetUrl;
                };
                
                btn.addEventListener('click', handleNavigation);
                btn.setAttribute('role', 'button');
                btn.setAttribute('tabindex', '0');
                
                // keyboard support (Enter / Space)
                btn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        window.location.href = targetUrl;
                    }
                });
            }
        });
    })();
</script>
</body>
</html>
