<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>pick clicker theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #fefef7;
            background-image: radial-gradient(circle at 25% 40%, rgba(200, 220, 150, 0.2) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, 'Exo 2', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .hub {
            max-width: 960px;
            width: 100%;
            background: rgba(255, 255, 245, 0.98);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -16px rgba(0, 0, 0, 0.2), 0 0 0 1px #f0e7d8 inset, 0 0 0 2px #fffef7 inset;
            padding: 2rem 1.8rem 2rem 1.8rem;
            transition: all 0.25s ease;
        }

        .title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3a7734, #d68b2c, #f0bc3e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .title h1 span {
            font-size: 1.8rem;
            background: none;
            -webkit-text-fill-color: initial;
            display: inline-block;
        }

        .grid-3x2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.4rem;
            margin: 1.6rem 0 2rem;
        }

        .game-btn {
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.12s ease, background 0.1s;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.08);
            background: #f5f0e0;
            width: 100%;
            aspect-ratio: 1 / 0.9;
            position: relative;
        }

        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.06);
            transition: 0.04s;
        }

        .btn-emoji {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: font-size 0.1s ease-out;
            filter: drop-shadow(2px 4px 10px rgba(0, 0, 0, 0.2));
            will-change: font-size;
        }

        .game-btn:hover .btn-emoji {
            transform: scale(1.02);
            transition: transform 0.12s;
        }

        .btn-peach { background: #ffe0c4; box-shadow: 0 8px 0 #ddb082; }
        .btn-apple { background: #d9f0c3; box-shadow: 0 8px 0 #8bb56a; }
        .btn-carrot { background: #ffddb0; box-shadow: 0 8px 0 #e6a35c; }
        .btn-corn { background: #fff0b5; box-shadow: 0 8px 0 #e6c46a; }
        .btn-lemon { background: #fff1a0; box-shadow: 0 8px 0 #e6bc4a; }
        .btn-tomato { background: #ffceb5; box-shadow: 0 8px 0 #dd8a62; }

        .btn-peach:hover { background: #ffd6b0; }
        .btn-apple:hover { background: #c8e8aa; }
        .btn-carrot:hover { background: #ffcf9a; }
        .btn-corn:hover { background: #ffe89a; }
        .btn-lemon:hover { background: #ffec8a; }
        .btn-tomato:hover { background: #ffbe9a; }

        .howto {
            background: #faf7f0;
            border-radius: 2rem;
            padding: 1rem 1.6rem;
            margin-top: 0.8rem;
            border: 1px solid #efe3ce;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .howto-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: #4a6e3a;
            font-size: 1rem;
        }

        .howto-left span {
            font-size: 1.9rem;
        }

        .howto-steps {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5c4a2e;
        }

        .step {
            background: #fff3e0;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }

        @media (max-width: 780px) {
            .hub {
                padding: 1.6rem;
            }
            .grid-3x2 {
                gap: 1rem;
            }
            .howto-steps .step {
                font-size: 0.75rem;
                padding: 0.2rem 0.7rem;
            }
        }

        @media (max-width: 580px) {
            .grid-3x2 {
                gap: 0.9rem;
            }
            .title h1 {
                font-size: 1.6rem;
            }
            .howto-left {
                font-size: 0.9rem;
            }
            .howto-left span {
                font-size: 1.5rem;
            }
            .step {
                font-size: 0.7rem;
            }
        }

        .game-btn:focus-visible {
            outline: 3px solid #f5bc70;
            outline-offset: 4px;
            transform: scale(0.98);
        }

        .game-btn {
            transition: transform 0.08s linear, box-shadow 0.12s, background 0.1s;
        }
    </style>
</head>
<body>
<div class="hub">
    <div class="title">
        <h1>
            <span>✨</span> pick clicker theme <span>🍒</span>
        </h1>
    </div>

    <div class="grid-3x2">
        <button class="game-btn btn-peach" data-url="https://clicker-game.neineig2012.workers.dev/peach">
            <span class="btn-emoji" data-emoji="🍑">🍑</span>
        </button>
        <button class="game-btn btn-apple" data-url="https://clicker-game.neineig2012.workers.dev/apple">
            <span class="btn-emoji" data-emoji="🍏">🍏</span>
        </button>
        <button class="game-btn btn-carrot" data-url="https://clicker-game.neineig2012.workers.dev/carrot">
            <span class="btn-emoji" data-emoji="🥕">🥕</span>
        </button>
        <button class="game-btn btn-corn" data-url="https://clicker-game.neineig2012.workers.dev/corn">
            <span class="btn-emoji" data-emoji="🌽">🌽</span>
        </button>
        <button class="game-btn btn-lemon" data-url="https://clicker-game.neineig2012.workers.dev/lemon">
            <span class="btn-emoji" data-emoji="🍋">🍋</span>
        </button>
        <button class="game-btn btn-tomato" data-url="https://clicker-game.neineig2012.workers.dev/tomato">
            <span class="btn-emoji" data-emoji="🍅">🍅</span>
        </button>
    </div>

    <div class="howto">
        <div class="howto-left">
            <span>🧑‍🌾</span> how to play
        </div>
        <div class="howto-steps">
            <div class="step">🍎 tap any fruit → launch clicker</div>
            <div class="step">🖱️ click giant crop → earn coins</div>
            <div class="step">⬆️ buy upgrades & research points</div>
            <div class="step">🌟 prestige for permanent multipliers</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const buttons = document.querySelectorAll('.game-btn');
        const emojiSpans = new Map();
        const resizeObservers = [];
        
        function updateEmojiSize(btn, emojiSpan) {
            if (!btn || !emojiSpan) return;
            const btnWidth = btn.clientWidth;
            if (btnWidth <= 0) return;
            
            let desiredSize = btnWidth * 0.5;
            const minSize = 28;
            const maxSize = 86;
            let finalSize = Math.min(maxSize, Math.max(minSize, desiredSize));
            
            emojiSpan.style.fontSize = finalSize + 'px';
            emojiSpan.style.lineHeight = '1';
            emojiSpan.style.display = 'inline-flex';
        }
        
        function updateButtonRadius(btn) {
            if (!btn) return;
            const btnHeight = btn.clientHeight;
            if (btnHeight <= 0) return;
            const radiusValue = btnHeight / 3;
            btn.style.borderRadius = radiusValue + 'px';
        }
        
        function updateBoth(btn, emojiSpan) {
            updateEmojiSize(btn, emojiSpan);
            updateButtonRadius(btn);
        }
        
        buttons.forEach(btn => {
            const emojiSpan = btn.querySelector('.btn-emoji');
            if (!emojiSpan) return;
            emojiSpans.set(btn, emojiSpan);
            
            const updateFn = () => {
                if (btn.isConnected) {
                    updateBoth(btn, emojiSpan);
                }
            };
            
            if (window.ResizeObserver) {
                const ro = new ResizeObserver((entries) => {
                    for (let entry of entries) {
                        if (entry.target === btn) {
                            updateBoth(btn, emojiSpan);
                        }
                    }
                });
                ro.observe(btn);
                resizeObservers.push(ro);
            }
            
            window.addEventListener('resize', () => {
                requestAnimationFrame(() => {
                    if (btn.isConnected) updateBoth(btn, emojiSpan);
                });
            });
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    updateBoth(btn, emojiSpan);
                });
            } else {
                updateBoth(btn, emojiSpan);
            }
        });
        
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                buttons.forEach(btn => {
                    const span = emojiSpans.get(btn);
                    if (span && btn.isConnected) updateBoth(btn, span);
                });
            }, 30);
        });
        
        window.addEventListener('load', () => {
            buttons.forEach(btn => {
                const span = emojiSpans.get(btn);
                if (span && btn.isConnected) updateBoth(btn, span);
            });
        });
        
        buttons.forEach(btn => {
            const url = btn.getAttribute('data-url');
            if (url) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = url;
                });
                btn.setAttribute('role', 'button');
                btn.setAttribute('tabindex', '0');
                btn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        window.location.href = url;
                    }
                });
            }
        });
        
        const style = document.createElement('style');
        style.textContent = `
            .game-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                transition: border-radius 0.08s ease-out;
            }
            .btn-emoji {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                transition: font-size 0.08s ease-out;
                transform-origin: center;
            }
        `;
        document.head.appendChild(style);
        
        setTimeout(() => {
            buttons.forEach(btn => {
                const span = emojiSpans.get(btn);
                if (span && btn.isConnected) updateBoth(btn, span);
            });
        }, 80);
        
        let resizeTimer;
        window.addEventListener('resize', () => {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                buttons.forEach(btn => {
                    const span = emojiSpans.get(btn);
                    if (span && btn.isConnected) updateBoth(btn, span);
                });
            }, 50);
        });
    })();
</script>
</body>
</html>
